<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Amazon Clone</div>

        <input type="text" id="search" placeholder="Search products...">

        <nav>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <section class="banner">
        <h1>Welcome to Amazon Clone</h1>
    </section>

    <section class="products" id="product-list">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Smart Watch</h3>
            <p>₹2000</p>
            <button onclick="addToCart('Smart Watch',2000)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Headphones</h3>
            <p>₹1500</p>
            <button onclick="addToCart('Headphones',1500)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Laptop</h3>
            <p>₹50000</p>
            <button onclick="addToCart('Laptop',50000)">
                Add to Cart
            </button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
